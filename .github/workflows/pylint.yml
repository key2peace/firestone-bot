name: Pylint

on: [push, pull_request]

concurrency:
  group: pylint-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@main
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@main
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint
    - name: Analysing the code with pylint
      run: |
        # Dynamically capture all python files across any matrix folder structure
        TARGET_FILES=$(git ls-files '*.py')
        if [ -n "$TARGET_FILES" ]; then
          pylint $TARGET_FILES --rcfile=.pylintrc
        else
        fi
          echo "No python files found in repository to lint."
